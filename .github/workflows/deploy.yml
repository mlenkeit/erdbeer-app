name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test

      - run: npm run build

      - name: Assemble deploy directory
        working-directory: .
        run: |
          mkdir -p deploy/api deploy/sql
          cp -r frontend/dist/* deploy/
          cp api/*.php api/.htaccess deploy/api/
          cp sql/schema.sql deploy/sql/

      - name: Generate env.php with credentials
        working-directory: .
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ALLOWED_ORIGIN: ${{ secrets.ALLOWED_ORIGIN }}
          SETUP_TOKEN: ${{ secrets.SETUP_TOKEN }}
        run: |
          php -r "
          \$vars = [
            'DB_HOST' => getenv('DB_HOST'),
            'DB_NAME' => getenv('DB_NAME'),
            'DB_USER' => getenv('DB_USER'),
            'DB_PASS' => getenv('DB_PASS'),
            'ALLOWED_ORIGIN' => getenv('ALLOWED_ORIGIN'),
            'SETUP_TOKEN' => getenv('SETUP_TOKEN'),
          ];
          \$code = \"<?php\\nreturn \" . var_export(\$vars, true) . \";\\n\";
          file_put_contents('deploy/api/env.php', \$code);
          "

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}/
