services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: erdbeer_test
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: erdbeer_test
      DB_USER: root
      DB_PASS: test
      ALLOWED_ORIGIN: "http://localhost:5173"
    volumes:
      - ./api:/var/www/html/api:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost/api/group/00000000000000000000000000000000"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: "http://api/api"
      DB_HOST: db
      DB_NAME: erdbeer_test
      DB_USER: root
      DB_PASS: test
